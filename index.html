<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Visor Anaglifo 3D</title>

    <link
      rel="icon"
      href="https://cdn-icons-png.flaticon.com/512/685/685655.png"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Fuente -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar glass-navbar">
      <div class="container">
        <span class="navbar-brand">🔴🔵 Visor Anaglifo 3D</span>
      </div>
    </nav>

    <div class="container main-content">
      <div class="text-center mb-4">
        <h1 class="title">Galería 3D</h1>
        <p class="subtitle">Experiencia visual estereoscópica</p>
      </div>

      <!-- CARRUSEL -->
      <div class="carousel-wrapper">
        <div
          id="carouselExample"
          class="carousel slide"
          data-bs-ride="carousel"
        >
          <!-- indicadores -->
          <div class="carousel-indicators" id="indicadores"></div>

          <div class="carousel-inner" id="carouselInner"></div>

          <!-- flechas -->
          <button
            class="carousel-control-prev custom-arrow"
            type="button"
            data-bs-target="#carouselExample"
            data-bs-slide="prev"
          >
            ‹
          </button>

          <button
            class="carousel-control-next custom-arrow"
            type="button"
            data-bs-target="#carouselExample"
            data-bs-slide="next"
          >
            ›
          </button>
        </div>
      </div>
    </div>

    <footer class="footer">
      <p>Desarrollado por Álvaro Madrid Morales</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
